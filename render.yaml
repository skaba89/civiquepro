# ━━ CiviquePro - Render Blueprint ━━
# Deploy to Render: https://render.com/docs/blueprint-spec
# Prerequisites:
#   1. Create a Neon PostgreSQL database at https://neon.tech
#   2. Set DATABASE_URL in the Render dashboard (or link Neon directly)
#   3. Generate NEXTAUTH_SECRET: openssl rand -base64 32

services:
  # ── Web Service (Next.js) ──
  - type: web
    name: civiquepro
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: |
      npm install &&
      npx prisma generate &&
      npx prisma migrate deploy &&
      npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Set manually: Neon PostgreSQL connection string
      - key: NEXTAUTH_SECRET
        generateValue: true  # Auto-generates a secure secret
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: civiquepro
          property: hosturl
      - key: PORT
        value: 3000
    healthCheckPath: /api/health
    numInstances: 1
